services:
  momotaro:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./library:/app/library:ro   # Point to your manga folder
      - momotaro_data:/app/data     # Database, thumbnails, CBZ cache
    environment:
      - SCAN_ON_STARTUP=true
      - METADATA_FETCH_ENABLED=true
      - REQUEST_DELAY_MS=700
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  momotaro_data:
