services:
  server:
    build: ./server
    volumes:
      - ./library:/library:ro
      - ./data:/app/data
    environment:
      - LIBRARY_PATH=/library
      - DATA_PATH=/app/data
      - PORT=3000
      - SCAN_ON_STARTUP=true
      - METADATA_FETCH_ENABLED=true
      - REQUEST_DELAY_MS=700
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
