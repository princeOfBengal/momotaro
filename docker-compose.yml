services:
  momotaro:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Your manga library (read-only). Change the left side to wherever
      # your manga lives.
      - ./library:/app/library:ro
      # Persistent app state: SQLite DB (libraries, reading lists, progress,
      # API keys, AniList/MAL/Doujinshi tokens), thumbnails, and CBZ cache.
      # This is a host bind mount — the data lives in ./data on the host, so
      # it survives `docker compose down`, `docker compose down -v`, image
      # rebuilds, Docker Desktop resets, and host reboots. Back this folder
      # up to back up the whole server.
      - ./data:/app/data
    environment:
      - SCAN_ON_STARTUP=true
      - METADATA_FETCH_ENABLED=true
      - REQUEST_DELAY_MS=700
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
